  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #131313;
      --border:    #1e1e1e;
      --border2:   #252525;
      --text:      #e8e4dc;
      --muted:     #666666;
      --top-rule:  #e8e4dc;
      --cal1:      #4ab682;
      --cal1-bg:   #0d2e1c;
      --cal2:      #f4a0a0;
      --cal2-bg:   #4a1a1a;
      --cal3:      #f0ead6;
      --cal3-text: #2a2010;
      --cal3-border: #c8a878;
      --cal4:      #888888;
      --cal4-bg:   #1e1e1e;
      --bin-bg:    #fcd34d;
      --bin-text:  #1a1200;
      --bin-border:#f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px 20px 32px;
      gap: 16px;
      width: 100%;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border2);
      padding-bottom: 14px;
      padding-top: 4px;
    }

    .header-left { display: flex; flex-direction: column; flex-shrink: 0; }

    /* Right block: sun cards + legend side by side */
    .header-right {
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: stretch;
      margin-left: auto;
    }

    /* Sun cards side by side */
    .sun-cards-wrap {
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: stretch;
    }

    #clock {
      font-family: 'Inter', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      color: var(--text);
    }

    #date-label {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      color: var(--muted);
      font-weight: 500;
      margin-top: 6px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Roboto', sans-serif;
    }

    /* Sun/moon — individual cards inside .sun-cards-wrap */
    #sun-bar {
      display: contents; /* children flow into .sun-cards-wrap flex */
    }

    .sun-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 120px;
    }

    .sun-card-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sun-card-icon { font-size: 1.1rem; line-height: 1; flex-shrink: 0; }

    .sun-card-detail { display: flex; flex-direction: column; gap: 1px; }

    .sun-card-label {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
    }

    .sun-card-value {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }

    .moon-chart {
      flex: 1; min-width: 80px; height: 20px;
      position: relative; display: flex; align-items: center;
      margin-top: 2px;
    }
    .moon-track { position: absolute; left: 0; right: 0; height: 2px; background: var(--border2); border-radius: 2px; }
    .moon-fill  { position: absolute; left: 0; height: 2px; background: linear-gradient(to right, #444, var(--text)); border-radius: 2px; }
    .moon-marker { position: absolute; top: 50%; transform: translate(-50%,-50%); font-size: 1rem; line-height: 1; }
    .moon-phase-label { font-size: 0.58rem; color: var(--muted); white-space: nowrap; letter-spacing: 0.04em; font-family: 'Roboto', sans-serif; }

    /* Legend — 2×2 grid of coloured cards */
    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      align-content: start;
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: clamp(0.6rem, 1.2vw, 0.68rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      color: #fff;
    }

    /* Per-person legend card colours */
    .legend-item[data-cal="1"] { background: var(--cal1); color: #fff; }
    .legend-item[data-cal="2"] { background: var(--cal2); color: #1a0a0a; }
    .legend-item[data-cal="3"] { background: var(--cal3); color: var(--cal3-text); }
    .legend-item[data-cal="4"] {
      background: #0a0a0a;
      color: #39ff14;
      position: relative;
      overflow: hidden;
    }

      content: '';
      position: absolute;

    .legend-item[data-cal="4"]::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.55) 40%, rgba(0,0,0,0.2) 100%);
      z-index: 1;
    }

      position: relative;
      z-index: 3;
    }

    .legend-dot { display: none; }



    /* ── Days grid ── */
    #days {
      display: grid;
      gap: 10px;
      align-items: start;
      grid-template-columns: repeat(auto-fill, minmax(min(180px, 100%), 1fr));
      min-width: 0;
      overflow: hidden;
    }

    .day-col {
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
    }

    /* Today — light cream card, cream left accent */
    .day-col.is-today {
      background: #e8e4dc;
      border-color: #d8d4cc;
      border-left: 3px solid #1a1a1a;
      color: #1a1a1a;
    }

    /* Day head — name + number inline, same size */
    .day-head {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border2);
    }

    .day-head-left {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .day-name {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .day-col.is-today .day-name { color: #2a2a2a; }

    .day-num {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -2px;
      color: var(--text);
    }

    .day-col.is-today .day-num  { color: #1a1a1a; }

    /* Weather inline */
    .wx-inline {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 6px;
    }

    .day-col.is-today .wx-inline {
      background: #ccc8c0;
      border-color: #b8b4ac;
    }
    .day-col.is-today .wx-slot { border-right-color: #b8b4ac; }
    .day-col.is-today .wx-slot-time { color: #777; }
    .day-col.is-today .wx-slot-temp { color: #222; }
    .day-col.is-today .wx-slot-mm   { color: #2060a0; }
    .day-col.is-today .no-events    { color: #aaa; }

    .wx-slot {
      display: grid;
      grid-template-rows: 1.2em 2.2em 1.4em 1.1em;
      align-items: center;
      justify-items: center;
      padding: 6px 2px;
      border-right: 1px solid var(--border);
    }
    .wx-slot:last-child { border-right: none; }

    .wx-slot-time {
      font-family: 'Roboto', sans-serif;
      font-size: clamp(0.52rem, 1.1vw, 0.65rem);
      color: var(--muted);
      font-weight: 400;
    }
    .wx-slot-icon {
      font-size: clamp(0.85rem, 1.8vw, 1.1rem);
      line-height: 1.2;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      overflow: hidden;
    }
    .wx-slot-temp {
      font-family: 'Roboto', sans-serif;
      font-size: clamp(0.62rem, 1.3vw, 0.78rem);
      font-weight: 500;
      color: var(--text);
    }
    .wx-slot-mm {
      font-family: 'Roboto', sans-serif;
      font-size: clamp(0.52rem, 1.1vw, 0.62rem);
      color: #4080c0;
      font-weight: 300;
    }

    /* ── Events ── */
    .events {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .event {
      border-radius: 6px;
      padding: 6px 9px;
      font-size: clamp(0.82rem, 1.8vw, 1rem);
      font-weight: 500;
      line-height: 1.3;
      word-break: break-word;
      color: #ffffff;
      position: relative;
      overflow: hidden;
    }

    .event-time {
      font-family: 'Roboto', sans-serif;
      font-size: clamp(0.62rem, 1.3vw, 0.75rem);
      font-weight: 300;
      opacity: 0.7;
      display: block;
      margin-bottom: 2px;
      color: inherit;
    }

    .event-title { display: block; }

    .no-events {
      font-size: clamp(0.75rem, 1.6vw, 0.9rem);
      color: var(--border2);
      font-style: italic;
    }

    /* ── NZ Holiday events — laser kiwi ── */
    .event.ev-nz {
      background: #0a0a0a;
      color: #39ff14;
    }
    .event.ev-nz .event-time {
      color: #22cc08;
      opacity: 0.85;
    }
    .event.ev-nz::before {
      content: '';

    #status {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0a0a0a;
      border-top: 1px solid var(--border);
      padding: 5px 14px;
      font-size: 0.6rem;
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      display: flex;
      gap: 16px;
      align-items: center;
      overflow: hidden;
      z-index: 100;
    }
    .log-item {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .log-label {
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.55rem;
    }
    .log-value { color: var(--border2); }
    .log-ok    { color: #4ab682; }
    .log-warn  { color: #fcd34d; }
    .log-err   { color: #f4a0a0; }
    .log-sep   { color: var(--border); }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .sun-divider { display: none; }
    }

    @media (max-width: 860px) {
      html, body { overflow-y: auto; height: auto; }
      #app { padding: 10px 10px 32px; gap: 10px; min-height: 100dvh; }
      #days { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .sun-divider { display: none; }
      .sun-row { gap: 10px; }
      #clock { font-size: clamp(3rem, 8vw, 5rem); }
      #date-label { font-size: clamp(1.1rem, 2.5vw, 1.4rem); }
      .legend-item { font-size: clamp(0.95rem, 2vw, 1.1rem); }
      .day-num { font-size: clamp(2rem, 5vw, 2.8rem); }
      .day-name { font-size: clamp(2rem, 5vw, 2.8rem); }
      .event { font-size: clamp(1rem, 2.2vw, 1.25rem); padding: 8px 10px; }
      .event-time { font-size: clamp(0.82rem, 1.8vw, 0.95rem); }
      .no-events { font-size: clamp(0.9rem, 2vw, 1.05rem); }
      .wx-slot-time { font-size: clamp(0.62rem, 1.4vw, 0.78rem); }
      .wx-slot-icon { font-size: clamp(1rem, 2.2vw, 1.3rem); }
      .wx-slot-temp { font-size: clamp(0.75rem, 1.7vw, 0.92rem); }
      .wx-slot-mm   { font-size: clamp(0.62rem, 1.4vw, 0.75rem); }
    }

    @media (max-width: 640px) {
      #app { padding: 12px 12px 24px; gap: 12px; }
      #days { grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
      header { padding-bottom: 12px; }
    }

    @media (max-width: 480px) {
      #app { padding: 12px 10px 32px; gap: 10px; }
      #days { grid-template-columns: 1fr; gap: 8px; }
      .day-col { padding: 14px 12px; }
      #clock { font-size: clamp(2.4rem, 12vw, 3.2rem); }
      .legend { gap: 8px 14px; }
      #sun-bar { gap: 12px; padding: 10px 14px; }
      .sun-divider { display: none; }
      .moon-chart { min-width: 100px; }
    }

<div id="app">

// ─────────────────────────────────────────────
//  Fetch + parse one iCal feed
// ─────────────────────────────────────────────
async function fetchCalendar(cal) {
  let url = cal.url.replace(/^webcal:\/\//i, 'https://');
  let lastErr;

  // Public feeds (e.g. NZ Holidays) can be fetched directly — no proxy needed
  if (cal.direct) {
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    if (!text.includes('BEGIN:VCALENDAR')) throw new Error('Not iCal data');
    return parseICal(text, cal);
  }

  for (const proxyFn of CORS_PROXIES) {
    try {
      const resp = await fetch(proxyFn(url), { cache: 'no-store' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const text = await resp.text();
      if (!text.includes('BEGIN:VCALENDAR')) throw new Error('Not iCal data');
      return parseICal(text, cal);
    } catch(e) {
      lastErr = e;
    }
  }
  throw new Error(lastErr ? lastErr.message : 'All proxies failed');
}

function parseICal(text, cal) {
  const jcal = ICAL.parse(text);
  const comp  = new ICAL.Component(jcal);

  // Register any timezones embedded in the calendar
  const vtimezones = comp.getAllSubcomponents('vtimezone');
  vtimezones.forEach(vtz => {
    try { ICAL.TimezoneService.register(vtz); } catch(e) {}
  });

  const events = [];

  const now   = new Date();
  const start = new Date(now); start.setHours(0, 0, 0, 0);
  start.setDate(start.getDate() - 30); // look back 30 days to catch ongoing multi-day events
  const end   = new Date(now); end.setHours(0, 0, 0, 0);
  end.setDate(end.getDate() + DAYS_TO_SHOW);

  const vevents = comp.getAllSubcomponents('vevent');

  // Separate master events from exception overrides (RECURRENCE-ID events)
  const masters    = [];
  const exceptions = {}; // key: "uid::dateStr"

  vevents.forEach(vevent => {
    try {
      const event = new ICAL.Event(vevent);
      if (!event.summary) return;
      if (event.isRecurrenceException()) {
        const key = event.uid + '::' + event.recurrenceId.toJSDate().toDateString();
        exceptions[key] = event;
      } else {
        masters.push(event);
      }
    } catch(e) {}
  });

  masters.forEach(event => {
    try {
      if (event.isRecurring()) {
        const expand = new ICAL.RecurExpansion({
          component: event.component,
          dtstart:   event.startDate
        });

        let count = 0;
        let next;
        while ((next = expand.next()) && count < 500) {
          count++;
          const nextJS = next.toJSDate();
          if (nextJS < start) continue;
          if (nextJS >= end) break;

          // Check if this occurrence has an exception override
          const key = event.uid + '::' + nextJS.toDateString();
          if (exceptions[key]) {
            // Use the exception event instead
            const ex = exceptions[key];
            const exStart = ex.startDate.toJSDate();
            const exEnd   = ex.endDate   ? ex.endDate.toJSDate() : null;
            if (exStart >= start && exStart < end) {
              events.push(makeEvent(ex, exStart, ex.startDate.isDate, exEnd, cal));
            }
          } else {
            const evEnd = event.endDate ? event.endDate.toJSDate() : null;
            events.push(makeEvent(event, nextJS, next.isDate, evEnd, cal));
          }
        }
      } else {
        const evStart = event.startDate.toJSDate();
        const evEnd   = event.endDate ? event.endDate.toJSDate() : null;
        // Include if event starts within window OR spans into the window
        if (evStart < end && (evEnd === null || evEnd > start)) {
          events.push(makeEvent(event, evStart, event.startDate.isDate, evEnd, cal));
        }
      }
    } catch(e) {}
  });

  return events;
}

function makeEvent(event, startDate, allDay, endDate, cal) {
  // Calculate end from duration if endDate is missing or wrong
  let end = endDate;
  if (allDay && end) {
    // iCal all-day events use exclusive end dates (DTEND is the day AFTER the last day)
    // Subtract 1ms so a Mon–Wed event ends 23:59:59 Wed, not 00:00:00 Thu
    end = new Date(end.getTime() - 1);
  } else if (!allDay && startDate) {
    try {
      const dur = event.duration;
      if (dur) {
        const durSecs = dur.toSeconds();
        if (durSecs > 0) {
          end = new Date(startDate.getTime() + durSecs * 1000);
        }
      }
    } catch(e) {}
  }
  return {
    title:  event.summary,
    start:  startDate,
    end:    end,
    allDay: allDay,
    color:  cal.color,
    cal:    cal.name
  };
}

function buildDayColumns() {
  const container = document.getElementById('days');
  container.innerHTML = '';
  const cols = [];
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < DAYS_TO_SHOW; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const isToday = i === 0;

    const names = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' is-today' : '');
    col.dataset.date = d.toDateString();

    col.innerHTML =
      `<div class="day-head">
        <div class="day-head-left">
          <div class="day-name">${names[d.getDay()]}</div>
          <div class="day-num">${d.getDate()}</div>
        </div>
       </div>
       <div class="wx-inline" id="wx-${localDateStr(d)}"></div>
       <div class="events"></div>`;

    container.appendChild(col);
    cols.push({ el: col, date: d });
  }
  return cols;
}

function renderEvents(allEvents, cols) {
  cols.forEach(({ el, date }) => {
    const eventsEl = el.querySelector('.events');
    eventsEl.innerHTML = '';

    const dayStart = new Date(date); dayStart.setHours(0,0,0,0);
    const dayEnd   = new Date(date); dayEnd.setHours(23,59,59,999);

    const dayEvents = allEvents
      .filter(e => {
        // Event starts within this day
        if (e.start >= dayStart && e.start <= dayEnd) return true;
        // Multi-day event: started before this day but hasn't ended yet
        if (e.end && e.start < dayStart && e.end > dayStart) return true;
        return false;
      })
      .sort((a, b) => {
        if (a.allDay && !b.allDay) return -1;
        if (!a.allDay && b.allDay) return 1;
        return a.start - b.start;
      });

    if (dayEvents.length === 0) {
      eventsEl.innerHTML = '<div class="no-events">—</div>';
      return;
    }

    dayEvents.forEach(ev => {
      const div = document.createElement('div');
      div.className = 'event';

      // Colour map per calendar
      const C = ev.color;
      const isCal1 = C === 'var(--cal1)' || C === '#4caf7d' || C === '#4ab682';
      const isCal2 = C === 'var(--cal2)' || C === '#58a6ff' || C === '#4fa1ff' || C === '#f4a0a0';
      const isCal3 = C === 'var(--cal3)' || C === '#f0ead6';
      let isCal4 = false;
      if (ev.isBin) {
        div.style.background = '#fcd34d';
        div.style.color      = '#1a1200';
      } else if (isCal1) {
        div.style.background = '#4ab682';
        div.style.color      = '#ffffff';
      } else if (isCal2) {
        div.style.background = '#f4a0a0';
        div.style.color      = '#1a0a0a';
      } else if (isCal3) {
        div.style.background = '#f0ead6';
        div.style.color      = '#2a2010';
      } else {
        // cal4 / NZ holidays / fallback — laser kiwi handled via CSS class
        isCal4 = true;
        div.style.background = '#0a0a0a';
        div.style.color      = '#39ff14';
      }

      if (ev.isBin) {
        div.style.cursor = 'pointer';
        div.style.userSelect = 'none';
        const binKey = 'bin_done_' + ev.start.toDateString();
        if (localStorage.getItem(binKey)) {
          div.style.opacity = '0.5';
          div.style.textDecoration = 'line-through';
        }
        div.addEventListener('click', function() {
          const done = localStorage.getItem(binKey);
          if (done) {
            localStorage.removeItem(binKey);
            div.style.opacity = '';
            div.style.textDecoration = '';
          } else {
            localStorage.setItem(binKey, '1');
            div.style.opacity = '0.5';
            div.style.textDecoration = 'line-through';
          }
        });
      }

      // Fade past events
      if (!ev.allDay && ev.end) {
        const now = new Date();
        if (ev.end < now) {
          div.style.opacity = '0.35';
        } else if (ev.start < now && ev.end > now) {
          // In progress — subtle fade
          div.style.opacity = '0.7';
        }
      }

      // Time + duration string
      let timeStr = '';
      if (!ev.allDay) {
        const h = ev.start.getHours();
        const m = ev.start.getMinutes();
        if (h !== 0 || m !== 0) {
          const startStr = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
          let t = startStr;
          if (ev.end) {
            const diffMs   = ev.end - ev.start;
            const diffMins = Math.round(diffMs / 60000);
            if (diffMins > 0) {
              const eh = ev.end.getHours();
              const em = ev.end.getMinutes();
              const endStr = String(eh).padStart(2,'0') + ':' + String(em).padStart(2,'0');
              const durStr = diffMins >= 60
                ? (diffMins % 60 === 0
                    ? (diffMins/60) + 'h'
                    : Math.floor(diffMins/60) + 'h' + (diffMins%60) + 'm')
                : diffMins + 'm';
              t = startStr + ' – ' + endStr + ' (' + durStr + ')';
            }
          }
          timeStr = `<span class="event-time">${t}</span>`;
        }
      }

      if (isCal4) div.classList.add('ev-nz');
      div.innerHTML = timeStr + `<span class="event-title">${escHtml(ev.title)}</span>`;
      eventsEl.appendChild(div);
    });
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Text symbol weather icons — crisp at any size, no loading required
// Returns an HTML string with styled Unicode symbols

    65: '<span style="color:#3b82f6;font-size:.9em">☁<br style="line-height:.3em">|||</span>',
    71: '<span style="color:#bfdbfe">*</span>',

// weeklyWeather[dateStr] = [{icon,temp,mm}, ...] for each WX_HOURS slot
let weeklyWeather = {};

async function fetchWeather() {
  const url = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude=' + WX_LAT
    + '&longitude=' + WX_LNG
    + '&hourly=temperature_2m,weather_code,precipitation'
    + '&daily=sunrise,sunset'
    + '&timezone=' + encodeURIComponent(WX_TZ)
    + '&forecast_days=7';

  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Weather HTTP ' + resp.status);
  const d = await resp.json();

  // Build a lookup: ISO-hour-string → {temp, code, mm}
  const hourly = {};
  d.hourly.time.forEach((t, i) => {
    hourly[t] = {
      temp: Math.round(d.hourly.temperature_2m[i]),
      code: d.hourly.weather_code[i],
      mm:   Math.round(d.hourly.precipitation[i] * 10) / 10
    };
  });

  // For each of the 7 forecast days, extract our 5 slots
  weeklyWeather = {};
  d.daily.time.forEach((dateStr, dayIdx) => {
    weeklyWeather[dateStr] = WX_HOURS.map(h => {
      const key = dateStr + 'T' + String(h).padStart(2,'0') + ':00';
      const slot = hourly[key] || {};
      return {
        icon: wmoIcon(slot.code !== undefined ? slot.code : -1, h),
        temp: slot.temp !== undefined ? slot.temp + '°' : '—',
        mm:   slot.mm !== undefined ? slot.mm + 'mm' : '—'
      };
    });
  });

  // Sun/moon header bar
  renderSunBar(d.daily.sunrise[0], d.daily.sunset[0]);

  // Cache weather
  try {
    localStorage.setItem('wx_cache', JSON.stringify({
      ts: Date.now(),
      weeklyWeather,
      sunrise: d.daily.sunrise[0],
      sunset:  d.daily.sunset[0]
    }));
  } catch(e) {}
}

// ─────────────────────────────────────────────
//  Moon phase (calculated, no API)
// ─────────────────────────────────────────────
function getMoonPhase(date) {
  // Known new moon: Jan 6 2000
  const known = new Date(2000, 0, 6);
  const cycle = 29.53058867;
  const days  = (date - known) / 86400000;
  const phase = ((days % cycle) + cycle) % cycle;
  const pct   = phase / cycle;

  let emoji, name;
  if      (pct < 0.03 || pct > 0.97) { emoji = '🌑'; name = 'New Moon'; }
  else if (pct < 0.22)                { emoji = '🌒'; name = 'Waxing Crescent'; }
  else if (pct < 0.28)                { emoji = '🌓'; name = 'First Quarter'; }
  else if (pct < 0.47)                { emoji = '🌔'; name = 'Waxing Gibbous'; }
  else if (pct < 0.53)                { emoji = '🌕'; name = 'Full Moon'; }
  else if (pct < 0.72)                { emoji = '🌖'; name = 'Waning Gibbous'; }
  else if (pct < 0.78)                { emoji = '🌗'; name = 'Last Quarter'; }
  else                                { emoji = '🌘'; name = 'Waning Crescent'; }

  return { emoji, name, pct };
}

function renderSunBar(sunriseISO, sunsetISO) {
  const sunrise = sunriseISO.slice(11, 16);
  const sunset  = sunsetISO.slice(11, 16);
  const moon    = getMoonPhase(new Date());
  const moonPct = Math.round(moon.pct * 100);

  const el = document.getElementById('sun-bar');
  el.dataset.sunrise = sunriseISO;
  el.dataset.sunset  = sunsetISO;

  // Sunrise/sunset card
  const sunriseVal = document.getElementById('sunrise-val');
  const sunsetVal  = document.getElementById('sunset-val');
  if (sunriseVal) sunriseVal.textContent = sunrise;
  if (sunsetVal)  sunsetVal.textContent  = sunset;

  // Moon card
  const moonEmoji  = document.getElementById('moon-emoji');
  const moonPhase  = document.getElementById('moon-phase-val');
  const moonFill   = document.getElementById('moon-fill-el');
  const moonMarker = document.getElementById('moon-marker-el');
  if (moonEmoji)  moonEmoji.textContent  = moon.emoji;
  if (moonPhase)  moonPhase.textContent  = moon.name;
  if (moonFill)   moonFill.style.width   = moonPct + '%';
  if (moonMarker) { moonMarker.style.left = moonPct + '%'; moonMarker.textContent = moon.emoji; }
}

// ─────────────────────────────────────────────
//  localStorage cache helpers
// ─────────────────────────────────────────────
const CACHE_KEY     = 'family_cal_cache_v4';
const WX_CACHE_KEY  = 'family_wx_cache';
const CACHE_MAX_AGE = 60 * 60 * 1000;    // 1 hour for calendars
const WX_MAX_AGE    = 30 * 60 * 1000;    // 30 min for weather

function saveCache(allEvents) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      ts: Date.now(),
      events: allEvents.map(e => ({
        ...e,
        start: e.start ? e.start.getTime() : null,
        end:   e.end   ? e.end.getTime()   : null
      }))
    }));
  } catch(e) {}
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, events } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_MAX_AGE) return null;
    return events.map(e => ({
      ...e,
      start: e.start ? new Date(e.start) : null,
      end:   e.end   ? new Date(e.end)   : null
    }));
  } catch(e) { return null; }
}

function saveWxCache() {
  try {
    localStorage.setItem(WX_CACHE_KEY, JSON.stringify({
      ts: Date.now(),
      weeklyWeather,
      sunrise: document.getElementById('sun-bar').dataset.sunrise || '',
      sunset:  document.getElementById('sun-bar').dataset.sunset  || ''
    }));
  } catch(e) {}
}

function loadWxCache() {
  try {
    const raw = localStorage.getItem(WX_CACHE_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (Date.now() - d.ts > WX_MAX_AGE) return null;
    return d;
  } catch(e) { return null; }
}

// ─────────────────────────────────────────────
//  Main load — weather first, then calendars
// ─────────────────────────────────────────────
async function load(background = false) {
  if (!background) renderLog();

  // ── Step 1: Render cached data instantly ──────────────────────────
  const cachedWx  = loadWxCache();
  const cachedCal = loadCache();

  const cols = buildDayColumns();

  if (cachedCal) {
    renderEvents([...cachedCal, ...getBinEvents()], cols);
  }

  if (cachedWx) {
    weeklyWeather = cachedWx.weeklyWeather;
    renderSunBar(cachedWx.sunrise, cachedWx.sunset);
    cols.forEach(({ el, date }) => renderDayWeather(el, localDateStr(date)));
    if (!background) status.textContent = 'From cache — refreshing…';
  }

  // ── Step 2: Fetch weather first — fast single direct API call ─────
  let freshCols = cols;

  try {
    await fetchWeather();

    // Weather is ready — rebuild columns and render weather immediately
    // so the strips appear before slow calendar fetches finish
    freshCols = buildDayColumns();
    if (cachedCal) renderEvents([...cachedCal, ...getBinEvents()], freshCols); // keep cached events visible
    freshCols.forEach(({ el, date }) => renderDayWeather(el, localDateStr(date)));
    logState.lastWxRefresh = new Date();
    logState.wxError = null;
    saveWxCache();
    renderLog();
  } catch(e) {
    logState.wxError = e.message || 'error';
    // Keep showing cached weather if fetch failed
    if (!cachedWx) document.getElementById('sun-bar').textContent = 'Weather unavailable';
  }

  // ── Step 3: Fetch calendars (slower, proxied) ──────────────────────
  const calResults = await Promise.allSettled(CALENDARS.map(fetchCalendar));

  const allEvents = [];
  const errors = [];

  calResults.forEach((r, i) => {
    if (r.status === 'fulfilled') {
      allEvents.push(...r.value);
    } else {
      if (!CALENDARS[i].url.includes('REPLACE_WITH')) {
        errors.push(CALENDARS[i].name + ': ' + r.reason.message);
      }
    }
  });

  // Final render with fresh everything
  const finalCols = buildDayColumns();
  const allEventsWithBins = [...allEvents, ...getBinEvents()];
  renderEvents(allEventsWithBins, finalCols);
  finalCols.forEach(({ el, date }) => renderDayWeather(el, localDateStr(date)));
  saveCache(allEvents);

  const now = new Date();
  logState.lastCalRefresh = now;
  logState.calErrors = errors;

  // Update event count
  const countEl = document.getElementById('log-event-count');
  if (countEl) countEl.textContent = allEvents.length + ' events';

  renderLog();
}

// ─────────────────────────────────────────────
//  Bin collection — Glen Eden, Auckland
//  Rubbish + food scraps: every Monday
//  Recycling: fortnightly Monday
//  If Monday is a public holiday → shifted to Tuesday
//  Known recycling week: 23 March 2026
// ─────────────────────────────────────────────
const BIN_DAY        = 1; // Monday
const RECYCLING_SEED = new Date(2026, 2, 23); // 23 March 2026 = recycling week

// Auckland public holidays that fall on a Monday (bin day shifts to Tuesday)
const MONDAY_HOLIDAYS = new Set([
  // 2025
  '2025-01-27', // Auckland Anniversary
  '2025-02-10', // Waitangi Day observed
  '2025-04-21', // Easter Monday
  '2025-04-28', // Anzac Day observed
  '2025-06-02', // King's Birthday
  '2025-10-27', // Labour Day
  // 2026
  '2026-01-26', // Auckland Anniversary
  '2026-04-06', // Easter Monday
  '2026-04-27', // Anzac Day observed
  '2026-06-01', // King's Birthday
  '2026-10-26', // Labour Day
  '2026-12-28', // Boxing Day observed
  // 2027
  '2027-02-01', // Auckland Anniversary
  '2027-02-08', // Waitangi Day observed
  '2027-03-29', // Easter Monday
  '2027-04-26', // Anzac Day observed
  '2027-06-07', // King\'s Birthday
  '2027-10-25', // Labour Day
  '2027-12-27', // Christmas observed
]);

function isRecyclingWeek(monday) {
  const diffDays = Math.round((monday - RECYCLING_SEED) / 86400000);
  return (diffDays / 7) % 2 === 0;
}

// Returns synthetic bin events for any Mondays in the 7-day window
function getBinEvents() {
  const events = [];
  const today  = new Date(); today.setHours(0, 0, 0, 0);

  for (let i = 0; i < DAYS_TO_SHOW; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    if (d.getDay() !== BIN_DAY) continue;

    const recycling  = isRecyclingWeek(d);
    const dateStr    = localDateStr(d);
    const isHoliday  = MONDAY_HOLIDAYS.has(dateStr);

    // If Monday is a holiday, collection shifts to Tuesday
    const collectionDate = new Date(d);
    if (isHoliday) collectionDate.setDate(collectionDate.getDate() + 1);

    const start = new Date(collectionDate); start.setHours(6, 30, 0, 0);
    const end   = new Date(collectionDate); end.setHours(7, 0, 0, 0);

    events.push({
      title:  recycling ? '🗑️ Rubbish + ♻️ Recycling + 🥦 Food scraps' : '🗑️ Rubbish + 🥦 Food scraps',
      start, end,
      allDay: false,
      color:  recycling ? '#6ee7b7' : '#fcd34d',
      cal:    'bins',
      isBin:  true
    });
  }
  return events;
}

buildLegend();
load(false);

// Background refresh — rebuilds silently
setInterval(() => load(true), REFRESH_MINS * 60 * 1000);

// Full page reload every 12 hours to clear memory on old iPad
const RELOAD_MS = 12 * 60 * 60 * 1000;
logState.nextReload = new Date(Date.now() + RELOAD_MS);
setInterval(() => location.reload(), RELOAD_MS);
</script>
